<!doctype html>
<!-- 宠物主窗口 — 150x130 透明窗口，显示 GIF + 状态文字 -->
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>桌面宠物</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
      }

      html, body {
        width: 150px;
        height: 130px;
        background: transparent;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      body {
        cursor: grab;
      }

      body:active {
        cursor: grabbing;
      }

      /* 宠物 GIF（120x80 像素风格） */
      #pet-gif {
        width: 120px;
        height: 80px;
        image-rendering: pixelated;
        pointer-events: none;
      }

      /* 状态文字 */
      #pet-txt {
        font-size: 12px;
        color: #cccccc;
        margin-top: 4px;
        text-align: center;
        pointer-events: none;
        font-weight: 500;
        -webkit-text-stroke: 0.3px rgba(0, 0, 0, 0.5);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 140px;
      }
    </style>
  </head>

  <body>
    <img id="pet-gif" src="/gifs/idle.gif" alt="宠物" />
    <div id="pet-txt">空闲</div>
    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
