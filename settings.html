<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宠物设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Consolas', 'Monaco', monospace;
      background: #0d1117;
      color: #c9d1d9;
      padding: 16px;
    }

    .container {
      max-width: 360px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #58a6ff;
      align-self: flex-start;
    }

    .pet-preview {
      width: 120px;
      height: 80px;
      image-rendering: pixelated;
      margin-bottom: 16px;
      border: 1px solid #30363d;
      border-radius: 4px;
      background: #161b22;
    }

    .form-group {
      width: 100%;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #8b949e;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #0d1117;
      color: #c9d1d9;
      font-size: 13px;
      font-family: inherit;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .button-group {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    button {
      flex: 1;
      padding: 8px 16px;
      border: 1px solid #30363d;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      background: #21262d;
      color: #c9d1d9;
      transition: background 0.2s;
    }

    button:hover {
      background: #30363d;
    }

    .btn-save {
      background: #238636;
      border-color: #238636;
      color: white;
    }

    .btn-save:hover {
      background: #2ea043;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pet Settings</h1>

    <img class="pet-preview" src="/gifs/idle.gif" alt="pet preview" />

    <div class="form-group">
      <label for="pet-name">Pet Name</label>
      <input type="text" id="pet-name" placeholder="Name your pet..." maxlength="20" />
    </div>

    <div class="button-group">
      <button id="btn-cancel">Cancel</button>
      <button class="btn-save" id="btn-save">Save</button>
    </div>
  </div>

  <script type="module" src="/src/settings.ts"></script>
</body>
</html>
